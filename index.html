<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="src/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>imposter-game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
  <div class="h-full min-h-screen relative text-white w-full p-5 flex items-center justify-center">
    <div class="h-full w-full fixed top-0 -z-10 ">
      <img class="h-full object-cover w-full" src="https://images6.alphacoders.com/867/867919.jpg">
    </div>
    <div class="md:w-1/3 p-5 bg-black/40 h-full  backdrop-blur-xs rounded-4xl">
      <h1 class="text-2xl font-semibold">Imposter <br> Game of Thrones Edition ⚔️</h1>
      <div
        class="h-52 flex flex-col gap-2 items-center justify-center bg-gray-950 border border-dashed border-white/30 w-full rounded-2xl mt-10">
        <p id="player-box">Ready?</p>
        <p class="text-2xl text-center" id="wordBox" >Game of Thrones Edition</p>
      </div>
      <div id="start-button"

        class=" h-14 rounded-2xl cursor-pointer bg-purple-950 mt-10 flex items-center uppercase text-sm font-medium justify-center">
        Show my Word
      </div>

      <div class="Setting button mt-5">
        <div id="setting-hide"
          class=" cursor-pointer h-10 w-10 bg-black/10 backdrop-blur-xs flex items-center justify-center rounded-2xl text-2xl">
          <i class="ri-settings-2-fill"></i>
        </div>
      </div>
      <div id="setting" class="hidden">
        <div class="flex mt-10 items-center gap-3 justify-between">
          <p class="uppercase font-medium tracking-wide">Players count:</p>
          <div class="flex  gap-2 ">
            <button id="sub"
              class="h-10 w-10 cursor-pointer flex items-center justify-center rounded-md bg-black/50 backdrop-blur-xs leading-0">-</button>
            <p id="playerCountBox"
              class="h-10 w-10 flex items-center justify-center rounded-md bg-black/50 backdrop-blur-xs leading-0">4</p>
            <button id="add"
              class="h-10 w-10 cursor-pointer flex items-center justify-center rounded-md bg-black/50 backdrop-blur-xs leading-0">+</button>
          </div>
        </div>
        <div class="mt-5">
          <p class="uppercase font-medium tracking-wide">Choose Series</p>

          <div class="mt-5">
            <div class="flex gap-2"><input checked type="checkbox" class="bg-black series-checkbox text-black"
                name="series" id="GOT" value="GOT"><label for="GOT">Game of thrones</label></div>
            <div class="flex gap-2"><input type="checkbox" class="bg-black series-checkbox text-black" name="series"
                id="HOTD" value="HOTD"> <label for="HOTD">House of the Dragons</label></div>
            <div class="flex gap-2"><input type="checkbox" class="bg-black series-checkbox text-black" name="series"
                id="AKOTSK" value="AKOTSK"><label for="AKOTSK">A Knight of the Seven Kingdom</label></div>
          </div>
        </div>
        <div id="save-button"
          class=" h-14 rounded-2xl cursor-pointer bg-purple-950 mt-10 flex items-center uppercase text-sm font-medium justify-center">
          Save and Restart
        </div>
      </div>

    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
